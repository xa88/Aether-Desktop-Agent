<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Desktop Agent (ADA)</title>
    <link rel="stylesheet" href="../design/tokens.css">
    <link rel="stylesheet" href="../design/base.css">
    <link rel="stylesheet" href="../design/components.css">
    <style>
        body {
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 250px;

        #main-content {

            padding: var(--ada-spacing-6);
            display: flex;
            flex-direction: column;

        .header {

            font-weight: 600;
            margin-bottom: var(--ada-spacing-4);
            color: var(--ada-color-primary);
        }

<body>
    <div id="sidebar">
        <div class="header">ADA Console</div>
        <nav>
            <ul>
                <li>Tasks</li>
                <li>IDE</li>
                <li>Voice</li>
                <li>Audit Logs</li>

        <h1>Welcome to Aether Desktop Agent</h1>
        <p>Initializing core runtime...</p>
